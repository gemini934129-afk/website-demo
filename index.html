<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老闆的自動更新網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .update-time {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .update-time h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        #lastUpdated {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            font-family: monospace;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .content-box {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            text-align: center;
            color: #999;
        }
        
        .emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦐 老闆的自動更新網站</h1>
        <p class="subtitle">示範靜態網站 + GitHub Pages 自動部署</p>
        
        <div class="update-time">
            <h2>⏰ 最後更新時間</h2>
            <div id="lastUpdated">2026-04-05 16:54:00</div>
        </div>
        
        <div class="status">
            <div class="status-dot"></div>
            <span>✅ 網站運作正常</span>
        </div>
        
        <div class="content-box">
            <div class="emoji">📝</div>
            <p>這個區塊可以放置自動更新的內容</p>
            <p>例如：財經新聞、法律週報、系統狀態...</p>
        </div>
    </div>
    
    <script>
        // 自動更新時間顯示
        function updateTime() {
            const now = new Date();
            const formatted = now.toLocaleString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdated').textContent = formatted;
        }
        
        // 每秒更新一次
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
