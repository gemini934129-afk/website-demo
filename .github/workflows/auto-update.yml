name: Auto Update Website

on:
  push:
    branches: [ main ]
  schedule:
    # 每小時自動更新
    - cron: '0 * * * *'
  workflow_dispatch:

# 設定權限
permissions:
  contents: read
  pages: write
  id-token: write

# 允許同時只執行一個部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Update content
      run: |
        echo "Updating website at $(date)"
        echo "<!-- Last updated: $(date) -->" >> index.html
        # 這裡可以加入更多自動更新內容的腳本
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
    
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
