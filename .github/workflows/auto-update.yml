name: Auto Update Website

on:
  push:
    branches: [ main ]
  schedule:
    # 每小時自動更新
    - cron: '0 * * * *'
  workflow_dispatch:

# 設定權限
permissions:
  contents: write
  pages: write
  id-token: write

# 允許同時只執行一個部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance
    
    - name: Update stock prices
      run: python update_stocks.py
    
    - name: Commit stock data changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add stock_data.json
        git diff --staged --quiet || git commit -m "Auto-update stock prices: $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push || echo "No changes to push"
    
    - name: Update timestamp
      run: |
        echo "Updating website at $(date)"
        echo "<!-- Last updated: $(date) -->" >> index.html
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
